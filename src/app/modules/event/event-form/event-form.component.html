<div class="form-container">

  <!-- Header -->
  <div class="form-header">
    <button class="btn-back" (click)="cancel()">
      ← Retour
    </button>
    <div>
      <h3 class="form-title">
        {{ isEdit ? '✏️ Modifier l\'événement'
                  : '➕ Nouvel événement' }}
      </h3>
      <p class="form-sub">
        Remplissez les informations de l'événement
      </p>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="alert-bar alert-error">
    ❌ {{ error }}
  </div>

  <!-- Form -->
  <div class="form-card" *ngIf="!loading">
    <form [formGroup]="form" (ngSubmit)="save()">

      <div class="form-section">
        <h6 class="section-title">Informations générales</h6>

        <div class="form-group">
          <label>Titre de l'événement *</label>
          <input type="text"
                 class="form-input"
                 formControlName="title"
                 placeholder="Ex: Séance de yoga du matin"
                 [class.invalid]="form.get('title')?.invalid
                   && form.get('title')?.touched">
          <span class="error-msg"
                *ngIf="form.get('title')?.invalid
                    && form.get('title')?.touched">
            Titre requis
          </span>
        </div>

        <div class="form-group">
          <label>Description *</label>
          <textarea class="form-input"
                    formControlName="description"
                    rows="4"
                    placeholder="Décrivez l'événement en détail..."
                    [class.invalid]="form.get('description')?.invalid
                      && form.get('description')?.touched">
          </textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Catégorie *</label>
            <select class="form-input"
                    formControlName="category">
              <option *ngFor="let cat of categories"
                      [value]="cat.value">
                {{ cat.icon }} {{ cat.label }}
              </option>
            </select>
          </div>
          <div class="form-group">
            <label>Lieu *</label>
            <input type="text"
                   class="form-input"
                   formControlName="location"
                   placeholder="Adresse ou lien visio">
          </div>
        </div>

      </div>

      <div class="form-section">
        <h6 class="section-title">Détails pratiques</h6>

        <div class="form-row">
          <div class="form-group">
            <label>Date de l'événement *</label>
            <input type="date"
                   class="form-input"
                   formControlName="eventDate">
          </div>
          <div class="form-group">
            <label>Participants maximum *</label>
            <input type="number"
                   class="form-input"
                   formControlName="maxParticipants"
                   min="1">
          </div>
        </div>

        <div class="form-group">
          <label>Image URL (optionnel)</label>
          <input type="url"
                 class="form-input"
                 formControlName="imageUrl"
                 placeholder="https://exemple.com/image.jpg">
        </div>

      </div>

      <!-- Preview catégorie -->
      <div class="preview-card">
        <div class="preview-label">Aperçu catégorie</div>
        <div class="preview-content">
          <span class="preview-icon">
{{ getCategoryIcon(form.get('category')?.value) }}
          </span>
          <span class="preview-cat">
            {{ form.get('category')?.value }}
          </span>
        </div>
      </div>

      <!-- Submit -->
      <div class="form-actions">
        <button type="button"
                class="btn-cancel"
                (click)="cancel()">
          Annuler
        </button>
        <button type="submit"
                class="btn-save"
                [disabled]="form.invalid || saving">
          <span *ngIf="saving"
                class="spinner-sm"></span>
          {{ saving ? 'Enregistrement...'
                    : (isEdit ? '💾 Mettre à jour'
                              : '✅ Créer l\'événement') }}
        </button>
      </div>

    </form>
  </div>

</div>
