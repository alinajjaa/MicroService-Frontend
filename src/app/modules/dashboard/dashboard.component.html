<div class="dashboard-container">

  <!-- Welcome Banner -->
  <div class="welcome-banner mb-4">
    <div class="welcome-text">
      <h2 class="mb-1">
        Bonjour, {{ user?.firstName }} ! 👋
      </h2>
      <p class="mb-0 opacity-75">
        Bienvenue sur votre espace bien-être personnel
      </p>
    </div>
    <div class="welcome-illustration">🌿</div>
  </div>

  <!-- Stats Row -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-icon">😊</div>
        <div class="stat-value">7</div>
        <div class="stat-label">Jours de suivi</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-icon">🧘</div>
        <div class="stat-value">3</div>
        <div class="stat-label">Méditations</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-icon">📚</div>
        <div class="stat-value">12</div>
        <div class="stat-label">Ressources lues</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-value">5</div>
        <div class="stat-label">Messages</div>
      </div>
    </div>
  </div>

  <!-- Module Cards -->
  <h5 class="fw-bold mb-3 text-dark">Mes modules</h5>
  <div class="row g-3">
    <div class="col-12 col-sm-6 col-lg-4"
         *ngFor="let card of cards">
      <a [routerLink]="card.path"
         class="module-card"
         [style.background]="card.color">
        <div class="module-icon">{{ card.icon }}</div>
        <div class="module-info">
          <h6 class="module-title">{{ card.title }}</h6>
          <p class="module-desc">{{ card.description }}</p>
        </div>
        <div class="module-arrow">→</div>
      </a>
    </div>
  </div>

</div>
