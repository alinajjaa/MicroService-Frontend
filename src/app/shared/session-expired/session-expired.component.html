<div class="session-overlay"
     *ngIf="sessionService.isExpired()">

  <div class="session-modal">

    <!-- Icône animée -->
    <div class="modal-icon">
      <div class="icon-ring"></div>
      <span class="icon-lock">🔒</span>
    </div>

    <!-- Contenu -->
    <div class="modal-content">
      <h4 class="modal-title">Session expirée</h4>
      <p class="modal-desc">
        Votre session a expiré pour des raisons de
        sécurité. Vous allez être redirigé vers la
        page de connexion.
      </p>

      <!-- Countdown -->
      <div class="countdown-wrap">
        <div class="countdown-circle">
          <svg viewBox="0 0 36 36" class="countdown-svg">
            <path class="countdown-bg"
                  d="M18 2.0845
                     a 15.9155 15.9155 0 0 1 0 31.831
                     a 15.9155 15.9155 0 0 1 0 -31.831"/>
            <path class="countdown-fill"
                  [style.stroke-dasharray]="
                    (sessionService.countdown() * 10) +
                    ', 100'"
                  d="M18 2.0845
                     a 15.9155 15.9155 0 0 1 0 31.831
                     a 15.9155 15.9155 0 0 1 0 -31.831"/>
          </svg>
          <span class="countdown-num">
            {{ sessionService.countdown() }}
          </span>
        </div>
        <div class="countdown-text">
          Redirection dans
          <strong>{{ sessionService.countdown() }}</strong>
          seconde{{ sessionService.countdown() > 1 ? 's' : '' }}
        </div>
      </div>

      <!-- Bouton -->
      <button class="btn-login"
              (click)="sessionService.redirectToLogin()">
        🔑 Se reconnecter maintenant
      </button>
    </div>

  </div>
</div>
